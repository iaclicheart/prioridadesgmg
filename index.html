<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Prioridades GMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-mesh">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Prioridades <span class="highlight">GMG</span></h1>
            <p>Arraste perfis entre filiais ou dentro de cada coluna. Tudo salvo automaticamente na nuvem.</p>

            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar por nome em todas as filiais...">
            </div>
        </header>

        <!-- Formulário de adicionar -->
        <div class="add-item-container">
            <div class="add-item-form">
                <i class="fas fa-plus-circle add-icon"></i>
                <input type="text" id="newProfileInput" placeholder="Nome do novo perfil..." autocomplete="off">
                <select id="newProfileFilial" class="filial-select">
                    <option value="Matriz">Matriz</option>
                    <option value="Pomerode">Pomerode</option>
                    <option value="Nordeste">Nordeste</option>
                </select>
                <button id="addProfileBtn">
                    <i class="fas fa-plus"></i> Adicionar
                </button>
            </div>
        </div>

        <!-- 3 colunas -->
        <div class="columns-wrapper">

            <div class="column">
                <div class="column-header column-header--matriz">
                    <i class="fas fa-building"></i>
                    <span class="column-title">Matriz</span>
                    <span class="column-count" id="count-Matriz">0</span>
                </div>
                <ul id="list-Matriz" class="sortable-list" data-filial="Matriz"></ul>
            </div>

            <div class="column">
                <div class="column-header column-header--pomerode">
                    <i class="fas fa-tree"></i>
                    <span class="column-title">Pomerode</span>
                    <span class="column-count" id="count-Pomerode">0</span>
                </div>
                <ul id="list-Pomerode" class="sortable-list" data-filial="Pomerode"></ul>
            </div>

            <div class="column">
                <div class="column-header column-header--nordeste">
                    <i class="fas fa-sun"></i>
                    <span class="column-title">Nordeste</span>
                    <span class="column-count" id="count-Nordeste">0</span>
                </div>
                <ul id="list-Nordeste" class="sortable-list" data-filial="Nordeste"></ul>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
