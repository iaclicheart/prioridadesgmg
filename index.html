<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Prioridades GMG</title>
    <!-- Modern Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Abstract Background -->
    <div class="background-mesh">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>Prioridades <span class="highlight">GMG</span></h1>
            <p>Arraste para reordenar, digite um novo número para mover, ou clique no texto para editar. As alterações são salvas na nuvem automaticamente.</p>
            
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Pesquisar prioridades por nome...">
            </div>
        </header>

        <div class="add-item-container">
            <div class="add-item-form">
                <i class="fas fa-plus-circle add-icon"></i>
                <input type="text" id="newProfileInput" placeholder="Nome do novo perfil (ex: CT_P5K_EMPRESA_MAQUINA_...)" autocomplete="off">
                <button id="addProfileBtn">
                    <i class="fas fa-plus"></i> Adicionar
                </button>
            </div>
        </div>

        <main class="list-container">
            <ul id="sortable-list" class="sortable-list">
                <!-- Items injectados via JS -->
            </ul>
        </main>
    </div>

    <!-- SortableJS Library (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="script.js"></script>
</body>
</html>
